<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenrix Elite — Security Portal</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            text-align: center;
            padding: 48px;
            border-radius: var(--radius-lg);
            background: rgba(10, 10, 46, 0.75);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-logo {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            object-fit: cover;
            margin-bottom: 24px;
            box-shadow: 0 0 35px rgba(139, 92, 246, 0.4);
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 0 45px rgba(139, 92, 246, 0.7); }
        }
        .login-title {
            font-size: 32px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .login-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-discord {
            background: #5865f2;
            color: #fff;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .btn-discord:hover {
            background: #4752c4;
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Background Animation Orbs -->
    <div class="bg-animation">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <img class="login-logo" src="{{ logo_url }}" alt="Fenrix Logo">
            <h1 class="login-title">FENRIX ELITE</h1>
            <p class="login-subtitle">
                Automated Discord security, live activity logs, role-based verification gates, and interactive moderation systems.
            </p>
            <div class="login-actions">
                <a href="{{ oauth_url }}" class="btn btn-discord btn-lg btn-block">
                    <i class="fa-brands fa-discord"></i> Login with Discord
                </a>
                <a href="/commands" class="btn btn-secondary btn-lg btn-block">
                    <i class="fa-solid fa-terminal"></i> Public Command List
                </a>
            </div>
        </div>
    </div>
</body>
</html>
